name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # cho phép bấm nút build thủ công trên GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "GoiYDatHang" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GoiYDatHang-Windows
          path: dist/GoiYDatHang.exe
          retention-days: 30
