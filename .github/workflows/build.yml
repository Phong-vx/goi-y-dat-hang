name: Build & Release EXE

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl Pillow pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "GoiYDatHang" `
            --clean `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import PIL._imagingtk `
            "--add-data=File_template/Bluecircle.png;File_template" `
            main.py

      - name: Upload EXE to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Phiên bản mới nhất"
          body: |
            Build tự động từ commit ${{ github.sha }}
            Cập nhật lúc: ${{ github.event.head_commit.timestamp }}

            **Cách dùng:** Tải file `GoiYDatHang.exe` về, double-click để mở.
          files: dist/GoiYDatHang.exe
          prerelease: false
          make_latest: true
